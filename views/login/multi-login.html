<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Timezone Admin Login — Collaborators Booking Portal</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/footer.css">
</head>
<body>
<div id="navbar-container"></div>

<main class="login-page">
    <div class="login-card">
        <h2>Multi-TZ Admin Portal</h2>
        <p class="subtitle">Authenticate to manage multi-timezone slots.</p>

        <div id="errorMessage" class="login-error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
    </div>
</main>

<div id="footer-container"></div>
<script src="../loader.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.style.display = 'none';
        errorDiv.textContent = '';

        try {
            const response = await fetch('/api/multi-admin/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();

            if (response.ok && data.success) {
                window.location.href = '/multi';
            } else {
                errorDiv.textContent = data.error || 'Invalid username or password.';
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            console.error('Login error:', err);
            errorDiv.textContent = 'An unexpected connection error occurred. Please try again.';
            errorDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
