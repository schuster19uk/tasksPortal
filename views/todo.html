<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board — Collaborators Booking Portal</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/todo.css">
    <link rel="stylesheet" href="/css/modal.css">
    <link rel="stylesheet" href="/css/footer.css">
</head>
<body>
 
<div id="navbar-container"></div>
 
<div class="topbar">
    <div class="topbar-brand">task<span>/</span>board</div>
    <div class="topbar-actions" style="display: none;">
        <button class="btn btn-primary" onclick="openNewTaskModal()">+ New Task</button>
        <button class="btn btn-secondary" onclick="openNewProjectModal()">+ New Project</button>
    </div>
</div>
 
<div class="filters-bar" style="display: flex; gap: var(--space-4, 16px); padding: var(--space-4, 16px); background: var(--surface); border-bottom: 1px solid var(--border); align-items: center; flex-wrap: wrap;">
    <div style="font-weight: 600; font-size: 0.9rem; color: var(--text-muted);">Filter Board:</div>
    
    <div>
        <select id="filter_project" onchange="applyBoardFilters()" style="padding: 6px 12px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius);">
            <option value="">All Projects</option>
        </select>
    </div>
 
    <div id="assignee_pills" style="display: flex; gap: 6px; flex-wrap: wrap; align-items: center;"></div>
    <!-- hidden select kept so todo.js populateMemberSelects() still works -->
    <select id="filter_assignee" style="display:none;" onchange="applyBoardFilters()">
        <option value="">All Assignees</option>
    </select>
 
    <button onclick="clearBoardFilters()" class="btn" style="padding: 6px 12px; font-size: 0.85rem; background: transparent; border: 1px solid var(--border); color: var(--text-muted);">
        Clear Filters
    </button>
</div>
 
 
<div class="todo-page">
 
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-val" id="statTotal">—</div>
            <div class="stat-label">Total Tasks</div>
        </div>
        <div class="stat-card">
            <div class="stat-val text-accent" id="statTodo">—</div>
            <div class="stat-label">To Do</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="statInProgress" style="color:var(--accent-2)">—</div>
            <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card">
            <div class="stat-val text-success" id="statDone">—</div>
            <div class="stat-label">Done</div>
        </div>
    </div>
 
    <!-- QUICK CREATE BAR -->
    <div class="quick-create-bar" style="display: flex; gap: var(--space-3, 12px); padding: var(--space-4, 16px); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); align-items: flex-start; flex-wrap: wrap; margin-bottom: var(--space-4, 16px);">
        <div style="font-weight: 600; font-size: 0.9rem; color: var(--text-muted); min-width: 80px; margin-top: 8px;">Quick Add:</div>
        <textarea id="quick_title" placeholder="Type a task title... &#10;Press Enter to save. Use Shift + Enter for a new line." maxlength="230" 
        style="flex: 1; min-width: 250px; height: 70px; padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); resize: vertical; overflow-y: auto; font-family: inherit; font-size: 0.95rem; line-height: 1.4;" 
        onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); quickCreateTask(); }"></textarea>
    </div>
 
    <!-- ADMIN TOOLS (project creation) — hidden by default, shown only for admin/owner roles -->
    <div class="admin-tools-bar" id="adminProjectSection" style="display: none; gap: var(--space-3, 12px); padding: var(--space-4, 16px); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); align-items: center; justify-content: space-between; margin-bottom: var(--space-4, 16px);">
        <div style="font-weight: 600; font-size: 0.9rem; color: var(--text-muted);">Admin Tools</div>
        <button class="btn btn-secondary" onclick="openNewProjectModal()">+ New Project</button>
    </div>

    <div class="toolbar">
        <div class="toolbar-left">
            <div class="filter-group" id="statusFilters">
                <button class="pill active" data-status="all">All (Exclude Completed)</button>
                <button class="pill" data-status="1">To Do</button>
                <button class="pill" data-status="2">In Progress</button>
                <button class="pill" data-status="3">Done</button>
            </div>
        </div>
        <input class="search-box" type="text" id="searchInput" placeholder="Search tasks...">
    </div>
 
    <div class="task-table-wrap">
        <table id="taskTable">
            <thead>
                <tr>
                    <th style="width:35%">Task</th>
                    <th>Assignee</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Due</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="taskBody">
                <tr><td colspan="6"><div class="loading">Loading tasks...</div></td></tr>
            </tbody>
        </table>
    </div>
</div>
 
<!-- NEW TASK MODAL -->
<div class="modal-overlay" id="newTaskModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">// new_task</div>
            <button class="modal-close" onclick="closeModal('newTaskModal')">&#x2715;</button>
        </div>
        <div class="form-group">
            <label class="form-label">Title *</label>
            <input type="text" class="form-control" id="nt_title" placeholder="What needs doing?">
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="nt_desc" placeholder="Optional details..."></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Priority</label>
                <select class="form-control" id="nt_priority">
                    <option value="1">Low</option>
                    <option value="2" selected>Medium</option>
                    <option value="3">High</option>
                    <option value="4">Urgent</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <select class="form-control" id="nt_status">
                    <option value="1" selected>To Do</option>
                    <option value="2">In Progress</option>
                    <option value="3">Done</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Assignee *</label>
                <select class="form-control" id="nt_assignee"></select>
            </div>
            <div class="form-group">
                <label class="form-label">Project</label>
                <select class="form-control" id="nt_project"><option value="">None</option></select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Due Date</label>
            <input type="date" class="form-control" id="nt_due">
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('newTaskModal')">Cancel</button>
            <button class="btn btn-primary" onclick="createTask()">Create Task</button>
        </div>
    </div>
</div>
 
<!-- NEW PROJECT MODAL -->
<div class="modal-overlay" id="newProjectModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">// new_project</div>
            <button class="modal-close" onclick="closeModal('newProjectModal')">&#x2715;</button>
        </div>
        <div class="form-group" style="margin-bottom: var(--space-4, 16px);">
            <label class="form-label">Project Name *</label>
            <input type="text" class="form-control" id="np_name" placeholder="e.g., Q3 Analytics, Marketing Website">
        </div>
        <div class="form-group" style="margin-bottom: var(--space-4, 16px);">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="np_desc" placeholder="Optional brief summary or objective..."></textarea>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('newProjectModal')">Cancel</button>
            <button class="btn btn-primary" onclick="createProject()">Create Project</button>
        </div>
    </div>
</div>
 
<!-- EDIT TASK MODAL -->
<div class="modal-overlay" id="editTaskModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">// edit_task</div>
            <button class="modal-close" onclick="closeModal('editTaskModal')">&#x2715;</button>
        </div>
        <div class="form-group">
            <label class="form-label">Title *</label>
            <input type="text" class="form-control" id="et_title">
        </div>
        <div class="form-group">
            <label class="form-label">Description</label>
            <textarea class="form-control" id="et_desc"></textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Priority</label>
                <select class="form-control" id="et_priority">
                    <option value="1">Low</option>
                    <option value="2">Medium</option>
                    <option value="3">High</option>
                    <option value="4">Urgent</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <select class="form-control" id="et_status">
                    <option value="1">To Do</option>
                    <option value="2">In Progress</option>
                    <option value="3">Done</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Assignee</label>
                <select class="form-control" id="et_assignee"></select>
            </div>
            <div class="form-group">
                <label class="form-label">Project</label>
                <select class="form-control" id="et_project"><option value="">None</option></select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Due Date</label>
            <input type="date" class="form-control" id="et_due">
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('editTaskModal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
        </div>
    </div>
</div>
 
<!-- ASSIGN MODAL -->
<div class="modal-overlay" id="assignModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">// assign_task</div>
            <button class="modal-close" onclick="closeModal('assignModal')">&#x2715;</button>
        </div>
        <p class="text-muted" style="font-size:0.82rem;margin-bottom:var(--space-4)">Select a member to assign this task to:</p>
        <div class="member-list" id="memberList"></div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="closeModal('assignModal')">Cancel</button>
            <button class="btn btn-primary" onclick="confirmAssign()">Assign</button>
        </div>
    </div>
</div>
 
<!-- TASK NOTES MODAL -->
<div class="modal-overlay" id="notesModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">// task_notes</div>
            <button class="modal-close" onclick="closeModal('notesModal')">&#x2715;</button>
        </div>

        <div id="notesList" style="display:flex; flex-direction:column; gap:10px; max-height:320px; overflow-y:auto; margin-bottom: var(--space-4, 16px);">
            <div class="loading">Loading notes...</div>
        </div>

        <div class="form-group">
            <label class="form-label" id="note_form_label">Add a note</label>
            <textarea class="form-control" id="note_text" placeholder="Leave a note or status update... &#10;Press Enter to save. Use Shift + Enter for a new line." maxlength="2000"
                onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); submitTaskNote(); }"></textarea>
        </div>

        <div class="modal-footer">
            <button class="btn btn-ghost" id="note_cancel_edit_btn" style="display:none;" onclick="cancelEditNote()">Cancel Edit</button>
            <button class="btn btn-ghost" onclick="closeModal('notesModal')">Close</button>
            <button class="btn btn-primary" id="note_submit_btn" onclick="submitTaskNote()">Add Note</button>
        </div>
    </div>
</div>

<div id="footer-container"></div>
<script src="./js/loader.js"></script>
<script src="./js/theme.js"></script>
<script src="./js/todo.js"></script>
 
<script>
// ── Admin-only "New Project" section ────────────────────────────────────
// todo.js sets the global `loggedInUser` after fetching /api/todo/me, but that
// fetch happens asynchronously, so poll briefly for it rather than assuming
// it's ready. Defaults to hidden if the role can never be confirmed.
(function () {
    function isAdminRole(user) {
        if (!user || !user.type_name) return false;
        const t = user.type_name.toLowerCase();
        return t === 'admin' || t === 'owner';
    }

    let attempts = 0;
    function _checkAdmin() {
        attempts++;
        if (typeof loggedInUser !== 'undefined' && loggedInUser) {
            const section = document.getElementById('adminProjectSection');
            if (section) section.style.display = isAdminRole(loggedInUser) ? 'flex' : 'none';
            return;
        }
        if (attempts < 100) setTimeout(_checkAdmin, 50); // give up after ~5s, stays hidden
    }
    _checkAdmin();
})();
</script>

<script>
// ── Assignee pills ────────────────────────────────────────────────────────
(function () {
    function buildAssigneePills() {
        const container = document.getElementById('assignee_pills');
        const select    = document.getElementById('filter_assignee');
        if (!container || !select) return;
        const current = select.value;
        container.innerHTML = '';
        [...select.options].forEach(function(o) {
            const btn = document.createElement('button');
            btn.className = 'pill' + (o.value === current ? ' active' : '');
            btn.textContent = o.text;
            btn.dataset.assignee = o.value;
            btn.addEventListener('click', function() {
                container.querySelectorAll('.pill').forEach(function(p) { p.classList.remove('active'); });
                btn.classList.add('active');
                select.value = o.value;
                applyBoardFilters();
            });
            container.appendChild(btn);
        });
    }
 
    const _patchPills = () => {
        if (typeof populateMemberSelects !== 'function') return setTimeout(_patchPills, 50);
        const _orig = populateMemberSelects;
        window.populateMemberSelects = function () {
            _orig.apply(this, arguments);
            buildAssigneePills();
        };
        // Already loaded
        if (typeof allMembers !== 'undefined' && allMembers.length) buildAssigneePills();
    };
 
    const _patchClear = () => {
        if (typeof clearBoardFilters !== 'function') return setTimeout(_patchClear, 50);
        const _origClear = clearBoardFilters;
        window.clearBoardFilters = function () {
            _origClear.apply(this, arguments);
            const pills = document.querySelectorAll('#assignee_pills .pill');
            pills.forEach(function(p, i) { p.classList.toggle('active', i === 0); });
        };
    };
 
    _patchPills();
    _patchClear();
})();
</script>
 
<script>
// Patch renderTasks to inject a Notes button into each row's existing
// .task-actions div (todo.js already renders Complete/Edit/Reassign/Reopen).
(function () {
    const _patch = () => {
        if (typeof renderTasks !== 'function') return setTimeout(_patch, 50);

        const _original = renderTasks;

        window.renderTasks = function () {
            _original.apply(this, arguments);

            document.querySelectorAll('#taskBody tr').forEach(tr => {
                const actions = tr.querySelector('.task-actions');
                if (!actions) return; // skip empty/loading rows
                if (actions.querySelector('.notes-btn')) return; // already patched

                const anyBtn = actions.querySelector('[onclick]');
                if (!anyBtn) return;
                const m = anyBtn.getAttribute('onclick').match(/\((\d+)\)/);
                if (!m) return;
                const taskId = m[1];
                const task = allTasks.find(t => t.task_id === Number(taskId));
                const noteCount = task ? (task.notes_count || 0) : 0;

                const btn = document.createElement('button');
                btn.className = 'btn btn-ghost btn-sm notes-btn';
                btn.title = noteCount > 0 ? (noteCount + ' note' + (noteCount === 1 ? '' : 's')) : 'Notes';
                btn.style.position = 'relative';
                btn.innerHTML = '&#x1F4AC;' + (noteCount > 0
                    ? '<span style="position:absolute; top:-6px; right:-6px; background:var(--accent-2, #6366f1); color:#fff; font-size:0.65rem; font-weight:700; line-height:1; border-radius:999px; padding:2px 4px; min-width:14px; text-align:center;">' + noteCount + '</span>'
                    : '');
                btn.setAttribute('onclick', 'openNotesModal(' + taskId + ')');
                actions.appendChild(btn);
            });
        };

        window.renderTasks();
    };

    _patch();
})();
</script>

<script>
// ── Task Notes modal ─────────────────────────────────────────────────────
// Backend endpoints (mirrors the /api/todo/* convention used elsewhere in todo.js):
//   GET    /api/todo/tasks/{taskId}/notes   -> [{ note_id, task_id, author_id, author_name, note_text, created_at }, ...]
//   POST   /api/todo/tasks/{taskId}/notes   body: { noteText }   (authorId comes from the session)
//   PATCH  /api/todo/notes/{noteId}         body: { noteText }   (edits an existing note)
//   DELETE /api/todo/notes/{noteId}         soft-deletes a note (is_deleted = TRUE)
// Response rows are expected in snake_case (matching project_task_notes columns,
// same as allTasks rows), POST/PATCH bodies in camelCase (same as createTask/saveEdit).
let notesTaskId = null;
let editingNoteId = null;

function openNotesModal(taskId) {
    notesTaskId = taskId;
    cancelEditNote();
    document.getElementById('notesList').innerHTML = '<div class="loading">Loading notes...</div>';
    openModal('notesModal');
    loadTaskNotes(taskId);
}

async function loadTaskNotes(taskId) {
    try {
        const res = await fetch('/api/todo/tasks/' + taskId + '/notes');
        const notes = await res.json();
        renderNotes(notes || []);
    } catch (err) {
        console.error('Failed to load notes', err);
        document.getElementById('notesList').innerHTML =
            '<div class="text-muted" style="font-size:0.85rem;">Couldn\'t load notes.</div>';
    }
}

function renderNotes(notes) {
    const list = document.getElementById('notesList');
    if (!notes.length) {
        list.innerHTML = '<div class="text-muted" style="font-size:0.85rem;">No notes yet — be the first to add one.</div>';
        return;
    }
    list.innerHTML = notes.map(n => {
        const when = n.created_at ? new Date(n.created_at).toLocaleString() : '';
        return (
            '<div class="note-item" style="padding:10px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius);">' +
                '<div style="display:flex; justify-content:space-between; align-items:baseline; gap:8px; margin-bottom:4px;">' +
                    '<span style="font-weight:600; font-size:0.85rem;">' + escHtml(n.author_name || 'Unknown') + '</span>' +
                    '<span class="text-muted" style="font-size:0.75rem; white-space:nowrap;">' + when + '</span>' +
                '</div>' +
                '<div style="font-size:0.9rem; line-height:1.4; white-space:pre-wrap;">' + escHtml(n.note_text) + '</div>' +
                '<div style="margin-top:6px; display:flex; gap:6px;">' +
                    '<button class="btn btn-ghost btn-sm" onclick="startEditNote(' + n.note_id + ', this)" title="Edit note">&#x270E;</button>' +
                    '<button class="btn btn-ghost btn-sm" onclick="deleteTaskNote(' + n.note_id + ')" title="Delete note">&#x1F5D1;</button>' +
                '</div>' +
            '</div>'
        );
    }).join('');
}

function startEditNote(noteId, btnEl) {
    const noteTextEl = btnEl.closest('.note-item').querySelector('div[style*="white-space:pre-wrap"]');
    editingNoteId = noteId;
    document.getElementById('note_text').value = noteTextEl ? noteTextEl.textContent : '';
    document.getElementById('note_form_label').textContent = 'Edit note';
    document.getElementById('note_submit_btn').textContent = 'Save Note';
    document.getElementById('note_cancel_edit_btn').style.display = '';
    document.getElementById('note_text').focus();
}

function cancelEditNote() {
    editingNoteId = null;
    document.getElementById('note_text').value = '';
    document.getElementById('note_form_label').textContent = 'Add a note';
    document.getElementById('note_submit_btn').textContent = 'Add Note';
    document.getElementById('note_cancel_edit_btn').style.display = 'none';
}

function submitTaskNote() {
    if (editingNoteId) updateTaskNote();
    else addTaskNote();
}

async function addTaskNote() {
    const textEl = document.getElementById('note_text');
    const text = textEl.value.trim();
    if (!text) { alert('Please enter a note.'); return; }
    if (!notesTaskId) return;

    try {
        const res = await fetch('/api/todo/tasks/' + notesTaskId + '/notes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ noteText: text })
        });
        if (res.ok) {
            textEl.value = '';
            await loadTaskNotes(notesTaskId);
            if (typeof loadTasks === 'function') loadTasks(); // refresh notes_count badge on the row behind the modal
        } else {
            alert('Failed to save note: ' + await res.text());
        }
    } catch {
        alert('Connection error.');
    }
}

async function updateTaskNote() {
    const textEl = document.getElementById('note_text');
    const text = textEl.value.trim();
    if (!text) { alert('Please enter a note.'); return; }
    if (!editingNoteId) return;

    try {
        const res = await fetch('/api/todo/notes/' + editingNoteId, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ noteText: text })
        });
        if (res.ok) {
            cancelEditNote();
            await loadTaskNotes(notesTaskId);
        } else {
            alert('Failed to update note: ' + await res.text());
        }
    } catch {
        alert('Connection error.');
    }
}

async function deleteTaskNote(noteId) {
    if (!confirm('Delete this note?')) return;
    try {
        const res = await fetch('/api/todo/notes/' + noteId, { method: 'DELETE' });
        if (res.ok) {
            if (editingNoteId === noteId) cancelEditNote();
            await loadTaskNotes(notesTaskId);
            if (typeof loadTasks === 'function') loadTasks(); // refresh notes_count badge on the row behind the modal
        } else {
            alert('Failed to delete note: ' + await res.text());
        }
    } catch {
        alert('Connection error.');
    }
}
</script>
</script>
</body>
</html>
